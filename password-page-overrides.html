<!-- =====================================================================
     Editorial overrides for the StaticCrypt password page.
     Injected into <head> of each encrypted case study by
     encrypt-case-studies.sh so the lock screen matches the Archival
     design system (Playfair Display + Space Mono, warm ground, orange).
     ===================================================================== -->

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&amp;family=Space+Mono&amp;display=swap" rel="stylesheet" />

<style>
  :root {
    --color-ground: #f2ede4;
    --color-ink:    #1e1e1e;
    --color-accent: #e85d3c;
    --color-muted:  #888888;
    --color-rule:   #d4cfc6;
    --color-label:  #1a1a1a;
    --serif: "Playfair Display", Georgia, serif;
    --sans:  "Space Mono", "Courier New", monospace;
  }

  body.staticrypt-body {
    background: var(--color-ground);
    font-family: var(--sans);
    color: var(--color-ink);
    margin: 0;
    min-height: 100vh;
  }
  .staticrypt-content {
    background: var(--color-ground);
    font-family: var(--sans);
    height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .staticrypt-spinner-container { background: var(--color-ground); }
  .staticrypt-spinner {
    border-color: var(--color-rule);
    border-right-color: transparent;
  }

  .staticrypt-page {
    width: 100%;
    max-width: 440px;
    padding: 0 2rem;
    margin: 0 auto;
    box-sizing: border-box;
  }

  /* Brand mark + folio header (injected by script below) */
  .editorial-header {
    text-align: center;
    margin: 0 0 2.5rem;
  }
  .editorial-header .brand {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--color-ink);
    text-decoration: none;
  }
  .editorial-header .brand:hover { color: var(--color-accent); }
  .editorial-header .folio {
    font-family: var(--sans);
    font-weight: 400;
    font-size: 9px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--color-label);
    margin: 1.25rem 0 0;
  }

  /* Form: transparent, no shadow */
  .staticrypt-form {
    background: transparent;
    box-shadow: none;
    padding: 0;
    max-width: 100%;
    margin: 0 auto 2rem;
  }
  .staticrypt-instructions {
    margin: 0 0 1.5rem;
    text-align: left;
  }
  .staticrypt-title {
    font-family: var(--serif);
    font-weight: 400;
    font-style: italic;
    font-size: 1.85rem;
    line-height: 1.15;
    letter-spacing: -.01em;
    color: var(--color-accent);
    margin: 0 0 .75rem;
  }
  .staticrypt-hr { display: none; }

  /* Password input */
  .staticrypt-password-container {
    background: #ffffff;
    border: 1px solid var(--color-rule);
    border-radius: 0;
    margin: 0 0 1rem;
  }
  .staticrypt-form input[type="password"],
  .staticrypt-form input[type="text"] {
    font-family: var(--sans);
    font-size: 13px;
    padding: .9rem 2.5rem .9rem 1rem;
    color: var(--color-ink);
    background: transparent;
    letter-spacing: .02em;
  }
  .staticrypt-form input::placeholder {
    color: var(--color-muted);
    font-family: var(--sans);
    letter-spacing: .15em;
    text-transform: uppercase;
    font-size: 10px;
    opacity: 1;
  }
  .staticrypt-toggle-password-visibility { opacity: .35; }

  /* Remember-me */
  label.staticrypt-remember {
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--color-muted);
    margin: 0 0 1.5rem;
    display: flex;
    align-items: center;
    gap: .5rem;
  }
  .staticrypt-remember input[type="checkbox"] {
    transform: scale(1.1);
    accent-color: var(--color-accent);
  }

  /* Submit button */
  .staticrypt-form .staticrypt-decrypt-button {
    font-family: var(--sans);
    font-weight: 400;
    font-size: 10px;
    letter-spacing: .2em;
    text-transform: uppercase;
    background: var(--color-accent);
    color: var(--color-ground);
    padding: 1rem 2rem;
    cursor: pointer;
    border: 0;
    width: 100%;
    transition: background .2s ease;
  }
  .staticrypt-form .staticrypt-decrypt-button:hover,
  .staticrypt-form .staticrypt-decrypt-button:focus,
  .staticrypt-form .staticrypt-decrypt-button:active {
    background: var(--color-ink);
    filter: none;
  }

  /* Back-to-portfolio link */
  .editorial-back {
    text-align: center;
    margin: 0;
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
  }
  .editorial-back a {
    color: var(--color-muted);
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: var(--color-rule);
    transition: color .2s, text-decoration-color .2s;
  }
  .editorial-back a:hover {
    color: var(--color-accent);
    text-decoration-color: var(--color-accent);
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.title = "Belinda Lanks — Protected case study";

    var title = document.querySelector('.staticrypt-title');
    if (title) title.textContent = "This case study is locked.";

    var btn = document.querySelector('.staticrypt-decrypt-button');
    if (btn) btn.value = "Read";

    var pwd = document.getElementById('staticrypt-password');
    if (pwd) pwd.placeholder = "Password";

    var form = document.querySelector('.staticrypt-form');
    if (form && !document.querySelector('.editorial-header')) {
      var header = document.createElement('div');
      header.className = 'editorial-header';
      header.innerHTML =
        '<a href="../index.html" class="brand">Belinda Lanks</a>' +
        '<p class="folio">§ Protected Reading</p>';
      form.parentNode.insertBefore(header, form);
    }

    var page = document.querySelector('.staticrypt-page');
    if (page && !document.querySelector('.editorial-back')) {
      var back = document.createElement('p');
      back.className = 'editorial-back';
      back.innerHTML = '<a href="../index.html">← Back to portfolio</a>';
      page.appendChild(back);
    }
  });
</script>
