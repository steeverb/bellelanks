<!-- =====================================================================
     Editorial overrides for the StaticCrypt password page.
     Injected into the <head> of each encrypted case study by
     encrypt-case-studies.sh so the lock screen matches the rest of
     the site (warm paper, Fraunces serif, Inter sans, vermilion accent).
     Loads after StaticCrypt's default <style>, so equal-specificity
     rules later in source win — no !important needed.
     ===================================================================== -->

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet" />

<style>
  :root {
    --paper: #faf7f2;
    --paper-deep: #ede5d4;
    --ink: #1c1a16;
    --ink-2: #4a443c;
    --rule: #d6cdb8;
    --accent: #872617;
    --serif: "Fraunces", Georgia, "Times New Roman", serif;
    --sans: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
  }

  body.staticrypt-body {
    background: var(--paper);
    font-family: var(--sans);
    color: var(--ink);
    margin: 0;
    min-height: 100vh;
  }
  .staticrypt-content {
    background: var(--paper);
    font-family: var(--sans);
    height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .staticrypt-spinner-container { background: var(--paper); }
  .staticrypt-spinner {
    border-color: var(--rule);
    border-right-color: transparent;
  }

  .staticrypt-page {
    width: 100%;
    max-width: 440px;
    padding: 0 2rem;
    margin: 0 auto;
    box-sizing: border-box;
  }

  /* Brand mark + folio header (DOM is injected by the script below) */
  .editorial-header {
    text-align: center;
    margin: 0 0 2.5rem;
  }
  .editorial-header .brand {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 1.1rem;
    color: var(--ink);
    text-decoration: none;
  }
  .editorial-header .brand:hover { color: var(--accent); }
  .editorial-header .folio {
    font-family: var(--sans);
    font-weight: 500;
    font-size: .7rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--ink-2);
    margin: 1.25rem 0 0;
  }

  /* Form: transparent, no shadow, no bordered card */
  .staticrypt-form {
    background: transparent;
    box-shadow: none;
    padding: 0;
    max-width: 100%;
    margin: 0 auto 2rem;
  }
  .staticrypt-instructions {
    margin: 0 0 1.5rem;
    text-align: left;
  }
  .staticrypt-title {
    font-family: var(--serif);
    font-weight: 400;
    font-style: italic;
    font-size: 1.85rem;
    line-height: 1.15;
    letter-spacing: -.01em;
    color: var(--ink);
    margin: 0 0 .75rem;
  }
  .staticrypt-hr { display: none; }

  /* Password input: editorial inset */
  .staticrypt-password-container {
    background: var(--paper-deep);
    border: 1px solid var(--rule);
    border-radius: 2px;
    margin: 0 0 1rem;
  }
  .staticrypt-form input[type="password"],
  .staticrypt-form input[type="text"] {
    font-family: var(--sans);
    font-size: 1rem;
    padding: .9rem 2.5rem .9rem 1rem;
    color: var(--ink);
    background: transparent;
  }
  .staticrypt-form input::placeholder {
    color: var(--ink-2);
    font-style: italic;
    font-family: var(--serif);
    opacity: .8;
  }
  .staticrypt-toggle-password-visibility { opacity: .4; }

  /* Remember-me */
  label.staticrypt-remember {
    font-family: var(--sans);
    font-size: .82rem;
    color: var(--ink-2);
    margin: 0 0 1.5rem;
    display: flex;
    align-items: center;
    gap: .5rem;
  }
  .staticrypt-remember input[type="checkbox"] {
    transform: scale(1.1);
    accent-color: var(--accent);
  }

  /* Submit button: vermilion editorial */
  .staticrypt-form .staticrypt-decrypt-button {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
    background: var(--accent);
    color: var(--paper);
    padding: 1rem 2rem;
    font-size: 1.05rem;
    cursor: pointer;
    border: 0;
    width: 100%;
    transition: background .2s ease;
  }
  .staticrypt-form .staticrypt-decrypt-button:hover,
  .staticrypt-form .staticrypt-decrypt-button:focus,
  .staticrypt-form .staticrypt-decrypt-button:active {
    background: var(--ink);
    filter: none;
  }

  /* Back-to-portfolio link (DOM injected by script below) */
  .editorial-back {
    text-align: center;
    margin: 0;
    font-family: var(--sans);
    font-size: .82rem;
  }
  .editorial-back a {
    color: var(--ink-2);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    padding-bottom: 1px;
    transition: color .2s, border-color .2s;
  }
  .editorial-back a:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
</style>

<script>
  // Relabel default StaticCrypt text and inject the brand mark + back link.
  // Runs once on DOMContentLoaded; the staticrypt JS replaces the whole
  // document on successful decryption so these elements don't persist.
  document.addEventListener('DOMContentLoaded', function () {
    document.title = "Belinda Lanks — Protected case study";

    var title = document.querySelector('.staticrypt-title');
    if (title) title.textContent = "This case study is locked.";

    var btn = document.querySelector('.staticrypt-decrypt-button');
    if (btn) btn.value = "Read →";

    var pwd = document.getElementById('staticrypt-password');
    if (pwd) pwd.placeholder = "Password";

    var form = document.querySelector('.staticrypt-form');
    if (form && !document.querySelector('.editorial-header')) {
      var header = document.createElement('div');
      header.className = 'editorial-header';
      header.innerHTML =
        '<a href="../index.html" class="brand">Belinda Lanks</a>' +
        '<p class="folio">§ Protected Reading</p>';
      form.parentNode.insertBefore(header, form);
    }

    var page = document.querySelector('.staticrypt-page');
    if (page && !document.querySelector('.editorial-back')) {
      var back = document.createElement('p');
      back.className = 'editorial-back';
      back.innerHTML = '<a href="../index.html">← Back to portfolio</a>';
      page.appendChild(back);
    }
  });
</script>
